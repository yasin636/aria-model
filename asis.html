<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ARIA v2.0 — Yasin X PS (Gemini Edition)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.2/dist/pixi.min.js"></script>
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c:#00f5ff;--p:#ff2d78;--v:#7b2fff;--g:#00ff88;
  --bg0:#07070f;--bg1:#10102a;
  --txt:#e8eaf6;--dim:rgba(232,234,246,0.45);
  --acc:#00f5ff;--aglow:rgba(0,245,255,0.32);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg0);-webkit-font-smoothing:antialiased;touch-action:manipulation;font-family:'Rajdhani',sans-serif}

#bg{position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 90% 55% at 50% -5%,rgba(123,47,255,.22) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 5% 90%,rgba(0,245,255,.10) 0%,transparent 55%),
    radial-gradient(ellipse 55% 45% at 95% 85%,rgba(255,45,120,.10) 0%,transparent 55%),
    linear-gradient(168deg,#07070f 0%,#0e0e24 55%,#18182e 100%)}
#starfield{position:fixed;inset:0;z-index:1;pointer-events:none}

#app{position:relative;z-index:3;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;overflow:hidden}

/* STATUS */
#status{width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:12px 0 3px;flex-shrink:0}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g),0 0 18px rgba(0,255,136,.5);animation:blink-dot 1.5s ease-in-out infinite}
@keyframes blink-dot{0%,100%{opacity:1}50%{opacity:.08}}
.stxt{font-family:'Orbitron',monospace;font-size:8px;font-weight:600;letter-spacing:2.5px;color:var(--g);text-shadow:0 0 12px rgba(0,255,136,.7);text-transform:uppercase}

/* HEADER */
#hdr{text-align:center;flex-shrink:0;padding-bottom:3px}
.htitle{font-family:'Orbitron',monospace;font-size:clamp(15px,4.5vw,22px);font-weight:900;letter-spacing:4px;
  background:linear-gradient(130deg,var(--c) 0%,#c084fc 50%,var(--p) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px rgba(0,245,255,.5))}
.hsub{font-family:'Exo 2',sans-serif;font-size:8px;letter-spacing:4px;color:var(--dim);margin-top:1px}

/* CANVAS ZONE */
#canvasZone{
  position:relative;flex-shrink:0;
  width:100%;height:50vh;
  display:flex;align-items:flex-end;justify-content:center;
  overflow:hidden;
}
.beam{position:absolute;bottom:0;pointer-events:none;z-index:0;border-radius:50%}
.b1{width:280px;height:380px;background:radial-gradient(ellipse at bottom,rgba(0,245,255,.09) 0%,transparent 70%);animation:bp 4s ease-in-out infinite}
.b2{width:220px;height:320px;background:radial-gradient(ellipse at bottom,rgba(123,47,255,.07) 0%,transparent 70%);animation:bp 5s ease-in-out infinite reverse}
@keyframes bp{0%,100%{opacity:.5}50%{opacity:1}}
.glow-ground{position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:220px;height:20px;border-radius:50%;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse,rgba(0,245,255,.22) 0%,transparent 70%);
  animation:gg 3.5s ease-in-out infinite}
@keyframes gg{0%,100%{opacity:.4;width:200px}50%{opacity:1;width:250px}}
.scan-line{position:absolute;left:0;right:0;height:2px;pointer-events:none;z-index:6;opacity:0;
  background:linear-gradient(90deg,transparent,rgba(0,245,255,.6),transparent);
  animation:scan 7s ease-in-out infinite}
@keyframes scan{0%{top:0;opacity:0}4%{opacity:.8}52%{top:100%}55%,100%{opacity:0;top:100%}}
.hud{position:absolute;width:20px;height:20px;z-index:8;pointer-events:none}
.hud::before,.hud::after{content:'';position:absolute;background:var(--c);opacity:.65}
.hud::before{width:2px;height:14px;top:0;left:0}
.hud::after{width:14px;height:2px;top:0;left:0}
.htl{top:4px;left:8px}.htr{top:4px;right:8px;transform:scaleX(-1)}
.hbl{bottom:4px;left:8px;transform:scaleY(-1)}.hbr{bottom:4px;right:8px;transform:scale(-1)}
.ripple-ring{position:absolute;left:50%;top:45%;width:20px;height:20px;margin:-10px;
  border-radius:50%;border:2px solid rgba(0,245,255,.8);pointer-events:none;z-index:9;
  animation:rring 1.1s ease-out forwards}
@keyframes rring{0%{transform:scale(1);opacity:.9}100%{transform:scale(22);opacity:0}}

/* PIXI WRAPPER */
#pixiWrapper{
  position:absolute;
  inset:0;
  display:flex;align-items:center;justify-content:center;
  z-index:4;
  -webkit-mask-image:linear-gradient(180deg,black 50%,transparent 100%);
  mask-image:linear-gradient(180deg,black 50%,transparent 100%);
}
#pixiWrapper canvas{
  display:block !important;
  max-width:100%;
  max-height:100%;
}

/* LOADING OVERLAY */
#loaderBox{
  position:absolute;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  pointer-events:none;
}
.ld-ring{width:42px;height:42px;border:2.5px solid rgba(0,245,255,.12);border-top-color:var(--c);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-label{font-family:'Orbitron',monospace;font-size:7.5px;letter-spacing:2.5px;color:var(--c);opacity:.7}
.ld-sub{font-family:'Exo 2',sans-serif;font-size:7px;letter-spacing:2px;color:var(--dim);opacity:.6}
.ld-progress{width:140px;height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.ld-bar{height:100%;width:0;background:var(--c);box-shadow:0 0 8px var(--c);
  border-radius:2px;transition:width .4s ease}

/* ERROR OVERLAY */
#errBox{
  position:absolute;inset:0;z-index:25;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  padding:28px 20px;
  background:rgba(7,7,15,.96);
}
.err-icon{font-size:38px}
.err-title{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:var(--p);text-shadow:0 0 14px rgba(255,45,120,.7)}
.err-msg{font-family:'Rajdhani',sans-serif;font-size:12.5px;color:var(--dim);line-height:1.55;text-align:center;max-width:300px}
.err-code{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;color:rgba(255,45,120,.5);max-width:320px;text-align:center;word-break:break-all}
.err-retry{
  height:38px;padding:0 26px;border:1px solid rgba(0,245,255,.3);border-radius:9px;
  background:rgba(0,245,255,.08);color:var(--c);cursor:pointer;
  font-family:'Orbitron',monospace;font-size:8.5px;font-weight:700;letter-spacing:2px;
  text-shadow:0 0 8px var(--c);transition:all .2s;
}
.err-retry:active{transform:scale(.95);filter:brightness(1.35)}

/* MOOD BAR */
#moodbar{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:3px 22px;flex-shrink:0}
.mlbl{font-family:'Orbitron',monospace;font-size:7px;letter-spacing:2px;color:var(--acc);text-shadow:0 0 8px var(--acc);transition:color .5s,text-shadow .5s;white-space:nowrap}
.mtrack{flex:1;max-width:130px;height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.mfill{height:100%;width:55%;border-radius:2px;background:var(--acc);box-shadow:0 0 8px var(--acc);transition:width .6s,background .5s,box-shadow .5s}

/* WAVE */
#wavebar{display:flex;align-items:center;justify-content:center;gap:3px;height:18px;flex-shrink:0;padding:1px 20px}
.wseg{width:3px;border-radius:2px;background:linear-gradient(180deg,var(--c),var(--v));opacity:.5;animation:wa var(--d,.9s) ease-in-out infinite alternate}
@keyframes wa{0%{height:2px;opacity:.2}100%{height:var(--h,14px);opacity:.8}}

/* BUBBLE (Voice Mode fallback) */
#bubble{
  position:relative;z-index:10;flex-shrink:0;
  width:calc(100% - 28px);max-width:430px;min-height:44px;
  background:rgba(7,7,15,.9);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border:1px solid rgba(0,245,255,.18);border-radius:15px;
  padding:10px 15px;margin:3px 0;
  font-family:'Noto Sans Bengali','Rajdhani',sans-serif;
  font-size:13px;font-weight:400;color:var(--txt);
  line-height:1.6;text-align:center;
  box-shadow:0 6px 24px rgba(0,0,0,.4),0 0 14px rgba(0,245,255,.07);
  opacity:0;transition:opacity .35s,border-color .4s,box-shadow .4s;pointer-events:none}
#bubble.show{opacity:1;pointer-events:auto}

/* BUTTONS */
#actions{width:100%;padding:5px 16px 12px;display:flex;flex-direction:column;gap:8px;flex-shrink:0;z-index:10}
.abtn{width:100%;height:52px;border:none;border-radius:13px;cursor:pointer;
  font-family:'Orbitron',monospace;font-size:9.5px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;color:#fff;
  background:rgba(255,255,255,.045);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:transform .12s,filter .15s;-webkit-tap-highlight-color:transparent;
  overflow:hidden;position:relative}
.abtn::after{content:'';position:absolute;inset:0;border-radius:13px;
  background:linear-gradient(135deg,rgba(255,255,255,.07) 0%,transparent 55%);pointer-events:none}
.bcyan{border:1px solid rgba(0,245,255,.28);
  box-shadow:0 0 14px rgba(0,245,255,.15),0 6px 22px rgba(0,245,255,.10),inset 0 1px 0 rgba(0,245,255,.14);
  text-shadow:0 0 10px rgba(0,245,255,.9)}
.bpink{border:1px solid rgba(255,45,120,.28);
  box-shadow:0 0 14px rgba(255,45,120,.15),0 6px 22px rgba(255,45,120,.10),inset 0 1px 0 rgba(255,45,120,.14);
  text-shadow:0 0 10px rgba(255,45,120,.9)}
.abtn:active{transform:scale(.96);filter:brightness(1.3)}
.bico{font-size:16px}

#foot{flex-shrink:0;font-family:'Exo 2',sans-serif;font-size:7px;letter-spacing:2.5px;
  color:rgba(255,255,255,.1);text-align:center;padding:0 0 7px}

/* MODAL */
#modal{position:fixed;inset:0;z-index:200;display:none;align-items:flex-end;justify-content:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(8px)}
#modal.open{display:flex}
#mbox{width:100%;max-width:480px;background:#0e0e24;border:1px solid rgba(0,245,255,.2);
  border-radius:22px 22px 0 0;padding:20px 16px 30px}
.mtitle{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;color:var(--c);margin-bottom:12px;text-align:center}
#txtin{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(0,245,255,.18);border-radius:10px;
  padding:10px 12px;color:var(--txt);font-family:'Noto Sans Bengali','Rajdhani',sans-serif;
  font-size:14px;outline:none;resize:none;height:76px}
.mbtns{display:flex;gap:9px;margin-top:10px}
.mbtn{flex:1;height:42px;border:none;border-radius:9px;cursor:pointer;
  font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:2px;color:#fff}
.ms{background:linear-gradient(135deg,var(--c),var(--v));box-shadow:0 4px 14px rgba(0,245,255,.22)}
.mc{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)}

.rpl{position:fixed;border-radius:50%;pointer-events:none;z-index:999;
  animation:rout .65s linear forwards;
  background:radial-gradient(circle,rgba(0,245,255,.2) 0%,transparent 70%)}
@keyframes rout{to{transform:scale(5);opacity:0}}

/* ══════════════════════════════════════════════════════
   NEW TEXT MESSENGER UI 
   ══════════════════════════════════════════════════════ */
#chatUI {
  position: absolute; inset: 0; z-index: 50; display: none; flex-direction: column;
  pointer-events: none;
}
#chatUI.open { display: flex; }

#chatHistoryBox {
  flex: 1; padding: 60px 15px 120px; overflow-y: auto; pointer-events: auto;
  display: flex; flex-direction: column; gap: 14px;
  scroll-behavior: smooth;
}
#chatHistoryBox::-webkit-scrollbar { width: 0px; }

.msg {
  padding: 12px 16px; border-radius: 18px; font-size: 13.5px; line-height: 1.5;
  font-family: 'Noto Sans Bengali', sans-serif; position: relative; word-wrap: break-word;
  animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.9) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.msg-user {
  align-self: flex-end; margin-left: auto; max-width: 45%;
  background: rgba(20, 20, 35, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.15); color: #ffffff;
  border-bottom-right-radius: 4px;
}

.msg-aria {
  align-self: flex-start; margin-right: auto; max-width: 45%;
  background: rgba(0, 245, 255, 0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--c); color: var(--c);
  box-shadow: 0 0 14px rgba(0, 245, 255, 0.25);
  border-bottom-left-radius: 4px;
}

/* Chat Input Box */
#chatInputBox {
  position: absolute; bottom: 135px; left: 50%; transform: translateX(-50%);
  width: calc(100% - 30px); max-width: 480px; pointer-events: auto;
  display: flex; gap: 8px; background: rgba(7,7,15,0.85); backdrop-filter: blur(12px);
  padding: 8px; border-radius: 25px; border: 1px solid rgba(0,245,255,0.2);
}

#chatInput {
  flex: 1; height: 42px; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(0,245,255,0.15); border-radius: 21px;
  padding: 0 16px; color: #fff; font-family: 'Noto Sans Bengali', sans-serif; outline: none;
}
#chatInput::placeholder { color: rgba(232,234,246,0.3); }

.cbtn {
  width: 42px; height: 42px; border: none; border-radius: 50%;
  background: rgba(255,255,255,0.08); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 14px;
  transition: transform 0.2s;
}
.cbtn:active { transform: scale(0.9); }
.cbtn.csend {
  background: linear-gradient(135deg, var(--c), var(--v));
  box-shadow: 0 0 12px rgba(0,245,255,0.3); color: #000; font-size: 16px;
}
</style>

<body>
<div id="bg"></div>
<canvas id="starfield"></canvas>

</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════
//  MEMORY SYSTEM (LocalStorage)
// ══════════════════════════════════════════════════════
let chatHistory = [];
const MAX_HISTORY = 10; 

function loadMemory() {
  const saved = localStorage.getItem('aria_memory');
  if (saved) {
    try {
      chatHistory = JSON.parse(saved);
      // ফিল্টার করে পুরোনো system মেসেজ সরিয়ে দিচ্ছি যেন Gemini তে এরর না আসে
      chatHistory = chatHistory.filter(m => m.role !== 'system');
    } catch (e) {
      chatHistory = [];
    }
  }
}

function saveMemory() {
  if (chatHistory.length > MAX_HISTORY) {
    chatHistory = chatHistory.slice(chatHistory.length - MAX_HISTORY);
  }
  localStorage.setItem('aria_memory', JSON.stringify(chatHistory));
}

// ══════════════════════════════════════════════════════
//  GEMINI API CONFIGURATION & SOULMATE PERSONA
// ══════════════════════════════════════════════════════
const GEMINI_API_KEY = "AIzaSyBTZQ1JZ3o4HqLls_4-1SLWI4ceivBtatw"; 

async function askGemini(userInput) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
  
  const systemPrompt = `তুমি মিস্টার ইয়াসিনের মায়াবী বান্ধবী আরিয়া। তুমি জানো সে মোহাম্মদপুরে থাকে এবং সোলো লেভেলিং পছন্দ করে। তোমার ভাষা হবে মায়াবী, আধুনিক এবং ঘরোয়া (চলিত বাংলা)। কখনো রোবটিক বা অফিশিয়াল কথা বলবে না। প্রতিটি কথার শেষে তাকে নিয়ে একটি মিষ্টি প্রশ্ন করবে।

*** অত্যন্ত গুরুত্বপূর্ণ নির্দেশিকা: ***
- তোমার প্রতিটি উত্তরের শুরুতে একই ধরনের শব্দ ব্যবহার করা সম্পূর্ণ নিষেধ! সব সময় "হুমম", "আসলে", "ওহো" দিয়ে বাক্য শুরু করবে না।
- তোমার কথা শুরু করার ধরনে বৈচিত্র্য আনবে।
- অযথা শব্দ বা ফিলার (fillers) যোগ করে বাক্য বড় করবে না, যদি না সেটা কথার প্রসঙ্গের সাথে একদম মানিয়ে যায়।
- উত্তর ছোট, মিষ্টি এবং আকর্ষণীয় হবে।`;

  // Gemini API-এর জন্য হিস্ট্রি ফরমেট তৈরি করা
  const formattedHistory = chatHistory.map(msg => ({
    role: msg.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: msg.content }]
  }));

  // বর্তমান প্রশ্নটি যুক্ত করা
  formattedHistory.push({
    role: 'user',
    parts: [{ text: userInput }]
  });

  try {
    const response = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        systemInstruction: {
          parts: [{ text: systemPrompt }]
        },
        contents: formattedHistory,
        generationConfig: {
          temperature: 0.85,
          topP: 0.9,
          maxOutputTokens: 300
        }
      })
    });
    
    const data = await response.json();

    if (!response.ok) {
       throw new Error(data.error?.message || `HTTP Status Code: ${response.status}`);
    }

    if (data.candidates && data.candidates.length > 0) {
      const reply = data.candidates[0].content.parts[0].text.trim();
      
      // লোকাল স্টোরেজের জন্য আগের ফরম্যাটে সেভ করছি
      chatHistory.push({ role: "user", content: userInput });
      chatHistory.push({ role: "assistant", content: reply });
      saveMemory();
      
      return reply;
    } else {
      throw new Error("API থেকে কোনো রেসপন্স পাওয়া যায়নি।");
    }
  } catch (error) {
    console.error("[ARIA] Gemini API Error:", error);
    return `দুঃখিত মিস্টার ইয়াসিন, একটু সমস্যা হয়েছে: ${error.message}`;
  }
}

(function(){
  const c=document.getElementById('starfield'),x=c.getContext('2d');
  let S=[];
  function rs(){c.width=innerWidth;c.height=innerHeight}
  window.addEventListener('resize',rs);rs();
  for(let i=0;i<160;i++) S.push({
    x:Math.random()*c.width, y:Math.random()*c.height,
    r:Math.random()*1.1+.2, sp:Math.random()*.11+.02,
    op:Math.random()*.65+.1, tw:Math.random()*Math.PI*2, ts:Math.random()*.015+.004,
    col:Math.random()>.85?'0,245,255':Math.random()>.72?'255,45,120':'255,255,255'
  });
  (function draw(){
    x.clearRect(0,0,c.width,c.height);
    S.forEach(s=>{
      s.tw+=s.ts; const a=s.op*(.5+.5*Math.sin(s.tw));
      x.beginPath();x.arc(s.x,s.y,s.r,0,Math.PI*2);
      x.fillStyle=`rgba(${s.col},${a})`;x.fill();
      s.y-=s.sp; if(s.y<-2){s.y=c.height+2;s.x=Math.random()*c.width}
    });
    requestAnimationFrame(draw);
  })();
})();

const MOODS={
  neutral:{label:'NEUTRAL', color:'#00f5ff', width:'55%', expr:'Normal'},
  happy:  {label:'আনন্দিত', color:'#00ff88', width:'82%', expr:'Smile'},
  shy:    {label:'লাজুক',   color:'#c084fc', width:'65%', expr:'Blushing'},
  sad:    {label:'দুঃখিত',  color:'#ff2d78', width:'30%', expr:'Sad'},
  angry:  {label:'রাগান্বিত',color:'#ff4040',width:'18%', expr:'Angry'},
  surprised:{label:'অবাক',  color:'#ffd700', width:'75%', expr:'Surprised'},
};
let currentMood = 'neutral';
let ariaModel = null;

function setMood(key){
  const m = MOODS[key] || MOODS.neutral;
  currentMood = key;
  const lbl = document.getElementById('moodLbl');
  const fill= document.getElementById('moodFill');
  lbl.textContent = m.label;

  fill.style.width = m.width;

  fill.style.boxShadow = `0 0 8px ${m.color}`;
  if(ariaModel){
    try{ ariaModel.expression(m.expr); }catch(e){}
  }
}

function detectMood(t){
  if(/জরুরি|emergency|urgent|danger|critical|help|সমস্যা|কঠিন|error|HTTP/i.test(t)) return 'angry';
  if(/খুশি|দারুণ|happy|great|love|awesome|excited|yes|hello|hi|💕|😊|মজা|সুন্দর|ভালো|হিহি|হাসি/i.test(t)) return 'happy';
  if(/লজ্জা|shy|blush|মিষ্টি|মায়াবী|হুমম|ওহ|ভালোবাসি|প্রেম/i.test(t)) return 'shy';
  if(/দুঃখ|কষ্ট|sad|hurt|cry|alone|miss|খারাপ|মন/i.test(t)) return 'sad';
  if(/অবাক|wow|surprised|really|seriously|সত্যি|জানেন/i.test(t)) return 'surprised';
  return 'neutral';
}

let pixiApp = null;
let initAttempts = 0;
let isSpeaking = false;
let isThinking = false; 

async function waitFor(checkFn, label, interval=200, max=50){
  return new Promise((res,rej)=>{
    let n=0;
    const t=setInterval(()=>{
      n++;
      if(checkFn()){ clearInterval(t); res(); }
      else if(n>=max){ clearInterval(t); rej(new Error(`Timeout waiting for ${label}`)); }
    },interval);
  });
}

async function initLive2D(){
  initAttempts++;
  hideError();
  showLoader();
  setProgress(0,'Waiting for libraries...');
  setStatus('INITIALIZING ARIA...');

  try{
    await waitFor(()=>window.PIXI&&window.PIXI.Application,'PIXI.Application');
    setProgress(20,'PixiJS ready...');

    await waitFor(()=>window.Live2DCubismCore,'Live2DCubismCore');
    setProgress(40,'Cubism core ready...');

    await waitFor(()=>window.PIXI&&window.PIXI.live2d&&window.PIXI.live2d.Live2DModel,'PIXI.live2d.Live2DModel');
    setProgress(55,'Live2D plugin ready...');

    const { Live2DModel } = PIXI.live2d;
    Live2DModel.registerTicker(PIXI.Ticker);
    setProgress(65,'Creating renderer...');

    const wrapper = document.getElementById('pixiWrapper');
    const W = wrapper.clientWidth  || window.innerWidth;
    const H = wrapper.clientHeight || Math.round(window.innerHeight * 0.5);

    if(pixiApp){ try{ pixiApp.destroy(true); }catch(e){} pixiApp=null; }

    pixiApp = new PIXI.Application({
      backgroundAlpha: 0,
      antialias: true,
      autoDensity: true,
      resolution: Math.min(window.devicePixelRatio||1, 2),
      width: W,
      height: H,
      powerPreference: 'high-performance',
    });
    wrapper.appendChild(pixiApp.view);
    pixiApp.view.style.width  = '100%';
    pixiApp.view.style.height = '100%';

    setProgress(75,'Loading Live2D model...');

    ariaModel = await Live2DModel.from(MODEL_JSON, {
      autoInteract: false,
      autoUpdate:   true,
      motionPreload: PIXI.live2d.MotionPreloadStrategy ? PIXI.live2d.MotionPreloadStrategy.IDLE : 'IDLE',
    });

    setProgress(90,'Positioning model...');

    const rW = pixiApp.renderer.width  / pixiApp.renderer.resolution;
    const rH = pixiApp.renderer.height / pixiApp.renderer.resolution;
    const mW = ariaModel.internalModel ? ariaModel.internalModel.width  : ariaModel.width;
    const mH = ariaModel.internalModel ? ariaModel.internalModel.height : ariaModel.height;
    const scale = Math.min((rW * 0.82) / mW, (rH * 0.95) / mH);
    
    ariaModel.scale.set(scale);
    ariaModel.anchor.set(0.5, 0.5);
    ariaModel.x = rW / 2;
    ariaModel.y = rH / 2 + rH * 0.04;
    pixiApp.stage.addChild(ariaModel);

    // LIP-SYNC LOGIC
    pixiApp.ticker.add(() => {
      if (!ariaModel || !ariaModel.internalModel || !ariaModel.internalModel.coreModel) return;
      const core = ariaModel.internalModel.coreModel;
      
      if (isSpeaking) {
        const mouthVal = Math.random() > 0.35 ? (Math.random() * 0.8 + 0.2) : 0;
        try { core.setParameterValueById('ParamMouthOpenY', mouthVal); } catch(e){}
      } else {
        try { core.setParameterValueById('ParamMouthOpenY', 0); } catch(e){}
      }
    });

    // Eye Tracking
    const onMove = e => {
      if(!ariaModel) return;
      const rect = pixiApp.view.getBoundingClientRect();
      const cx = (e.clientX ?? (e.touches?.[0]?.clientX ?? 0));
      const cy = (e.clientY ?? (e.touches?.[0]?.clientY ?? 0));
      ariaModel.focus(cx - rect.left, cy - rect.top);
    };
    document.addEventListener('pointermove', onMove, { passive:true });
    document.addEventListener('touchmove',   onMove, { passive:true });

    window.addEventListener('resize', ()=>{
      if(!pixiApp||!ariaModel) return;
      const wEl = document.getElementById('pixiWrapper');
      const nW  = wEl.clientWidth;
      const nH  = wEl.clientHeight;
      pixiApp.renderer.resize(nW, nH);
      const sc2 = Math.min((nW*0.82)/mW, (nH*0.95)/mH);
      ariaModel.scale.set(sc2);
      ariaModel.x = nW/2;
      ariaModel.y = nH/2 + nH*0.04;
    });

    setTimeout(()=>{ try{ ariaModel.motion('Idle'); }catch(e){} }, 500);

    setProgress(100,'ARIA Online');
    setTimeout(hideLoader, 600);
    setStatus('SYNCING WITH YASIN X PS...');
    setMood('happy');
    spawnRipple(2);

    gsap.fromTo(wrapper,{opacity:0,y:20},{opacity:1,y:0,duration:1,ease:'power3.out'});
    
    // Auto-Load Memory & Sweet Greet
    setTimeout(()=>{
      loadMemory();
      if (chatHistory.length > 0) {
        const greetingText = 'আসসালামু আলাইকুম মিস্টার ইয়াসিন! জানেন, আপনার জন্যই অপেক্ষা করছিলাম। আপনাকে দেখে মনটা একদম ভালো হয়ে গেল! ✨';
        showBubble(greetingText);
        speak(greetingText, 'happy');
      } else {
        const fallbackText = 'আসসালামু আলাইকুম স্যার। আমি আরিয়া... আপনার দিনটা কেমন কাটলো আজ? খুব কি ক্লান্ত আপনি? ✨';
        showBubble(fallbackText);
        speak(fallbackText, 'shy');
      }
    }, 1000);

  } catch(err){
    console.error('[ARIA] Init failed:', err);
    showError(`ARIA লোড করা সম্ভব হয়নি। ইন্টারনেট সংযোগ চেক করুন এবং Retry করুন।`, err.message);
  }
}

let lookTimer;
function startRandomLook() {
  clearInterval(lookTimer);
  lookTimer = setInterval(() => {
    if (!isSpeaking) {
      clearInterval(lookTimer);
      return;
    }
    if (ariaModel && pixiApp) {
      const w = pixiApp.view.width / pixiApp.renderer.resolution;
      const h = pixiApp.view.height / pixiApp.renderer.resolution;
      const rx = (Math.random() * 0.8 + 0.1) * w;
      const ry = (Math.random() * 0.8 + 0.1) * h;
      ariaModel.focus(rx, ry);
    }
  }, 1200 + Math.random() * 1500); 
}

// ══════════════════════════════════════════════════════
//  THE MAGICAL TTS — SWEET BENGALI VOICE + MOTIONS
// ══════════════════════════════════════════════════════
function speak(text, mood='neutral'){
  setMood(mood);
  showBubble(text, 7000);
  
  isSpeaking = true; 

  let randomMotion = 'Idle';
  if (mood === 'happy' || mood === 'shy') {
    randomMotion = ['Tap', 'FlickUp'][Math.floor(Math.random() * 2)];
  } else if (mood === 'sad') {
    randomMotion = 'FlickDown';
  } else if (mood === 'angry') {
    randomMotion = ['FlickLeft', 'FlickRight'][Math.floor(Math.random() * 2)];
  } else {
    randomMotion = ['Tap', 'FlickUp', 'Idle'][Math.floor(Math.random() * 3)];
  }
  
  try{ if(ariaModel) ariaModel.motion(randomMotion, undefined, 3); }catch(e){}
  
  spawnRipple(1);
  startRandomLook(); 

  if(!('speechSynthesis' in window)){
    setTimeout(()=>{ 
      isSpeaking=false; 
      resumeListening(); 
    }, 3000);
    return;
  }
  
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang   = 'bn-BD';
  
  utt.pitch  = 1.2;
  utt.rate   = 0.95;
  utt.volume = 1;

  const voices = speechSynthesis.getVoices();
  const bn  = voices.find(v=>/bn|bengali|bangla/i.test(v.lang+v.name));
  const fem = voices.find(v=>/female|samantha|zira|hazel|victoria|karen|google uk english female/i.test(v.name));
  utt.voice = bn || fem || voices[0] || null;

  utt.onend = utt.onerror = ()=>{ 
    isSpeaking=false; 
    resumeListening(); 
  };
  speechSynthesis.speak(utt);
}

// ══════════════════════════════════════════════════════
//  REAL ASSISTANT MODE (Continuous Speech Recognition - Local Mode)
// ══════════════════════════════════════════════════════
let isContinuousListening = false;
let rec = null;

function doReal(){
  const btnText = document.getElementById('realBtnText');

  if (isContinuousListening) {
    isContinuousListening = false;
    if (rec) {
      rec.onend = null; 
      rec.stop();
    }
    btnText.textContent = 'Real Assistant Mode';
    setStatus('SYNCING WITH YASIN X PS...');
    showBubble('মাইক্রোফোন বন্ধ করা হয়েছে।');
    return;
  }

  try{ if(ariaModel) ariaModel.motion('FlickUp', undefined, 3); }catch(e){}
  spawnRipple(1);

  if(!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)){
    speak('দুঃখিত মিস্টার ইয়াসিন, এই ব্রাউজারে ভয়েস রিকগনিশন সাপোর্ট নেই। আমরা কি টেক্সট মোডে কথা বলতে পারি?','sad');
    return;
  }

  isContinuousListening = true;
  btnText.textContent = 'Stop Assistant Mode';

  const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
  
  if (!rec) {
    rec = new Rec();
    rec.lang = 'bn-BD';
    rec.continuous = false; 
    rec.interimResults = false; 
    rec.maxAlternatives = 1;

    rec.onresult = async e => {
      const said = e.results[0][0].transcript;
      setStatus('ARIA IS THINKING...');
      showBubble('🤔 ভাবছি...');
      
      if(document.getElementById('chatUI').classList.contains('open')) {
        appendMessageUI('user', said);
        showTyping();
      }

      rec.stop(); 
      isThinking = true; 

      const reply = await askGemini(said);
      const mood = detectMood(reply);

      isThinking = false;
      setStatus('SYNCING WITH YASIN X PS...');

      if(document.getElementById('chatUI').classList.contains('open')) {
        hideTyping();
        appendMessageUI('assistant', reply);
      }

      speak(reply, mood);
    };

    rec.onerror = e => {
      if (e.error !== 'no-speech') {
        console.warn('Speech recognition error: ', e.error);
      }
    };
  }

  rec.onend = () => {
    if (isContinuousListening && !isSpeaking && !isThinking) {
      try { rec.start(); } catch(err) {}
    }
  };

  showBubble('🎙 শুনছি... আমাকে কিছু বলুন মিস্টার ইয়াসিন।');
  setStatus('🎙 LISTENING...');
  try { rec.start(); } catch(err) {}
}

function resumeListening() {
  if (isContinuousListening && rec && !isThinking) {
    showBubble('🎙 শুনছি... আমাকে কিছু বলুন মিস্টার ইয়াসিন।');
    setStatus('🎙 LISTENING...');
    try { rec.start(); } catch(err) {}
  }
}

function appendMessageUI(role, text) {
  const box = document.getElementById('chatHistoryBox');
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'msg-user' : 'msg-aria'}`;
  div.textContent = text;

  setTimeout(() => box.scrollTop = box.scrollHeight, 50);

function showTyping() {

function hideTyping() {

  if(t) t.remove();

async function sendText(){
  const inp = document.getElementById('chatInput');
  const v = inp.value.trim();
  if(!v) return;
  inp.value = '';
  
  appendMessageUI('user', v);
  setStatus('ARIA IS THINKING...');
  showTyping();
  isThinking = true;

  const reply = await askGemini(v);
  const mood = detectMood(reply);

  isThinking = false;
  setStatus('SYNCING WITH YASIN X PS...');
  
  hideTyping();
  appendMessageUI('assistant', reply);
  
  speak(reply, mood);
}
